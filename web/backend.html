<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diameter Backend Viewer</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f4f6fb; color: #1d2636; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .card { background: #fff; border: 1px solid #dfe6f3; border-radius: 10px; padding: 12px; }
    .grid { display: grid; grid-template-columns: 360px 1fr; gap: 12px; margin-top: 12px; }
    @media (max-width: 980px){ .grid { grid-template-columns: 1fr; }}
    input, button { padding: 8px 10px; border: 1px solid #ccd6ea; border-radius: 8px; }
    button { background: #2f67ff; color: #fff; border: none; cursor: pointer; }
    .list { max-height: 520px; overflow: auto; border: 1px solid #e2e8f5; border-radius: 8px; }
    .item { border-bottom: 1px solid #edf1fa; padding: 8px; cursor: pointer; }
    .item.active { background: #e8efff; }
    pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-size: 12px; max-height: 520px; overflow: auto; }
    .muted { color: #5f6e88; font-size: 12px; }
    .err { color: #c62828; font-size: 13px; }
    details { margin-left: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Diameter Backend Viewer</h2>
    <div class="muted">Upload PCAP -> backend parses via tshark -> inspect packets/layers</div>

    <div class="card" style="margin-top:12px;">
      <div class="row">
        <input id="apiBase" type="text" value="http://localhost:3001" style="min-width:240px; flex: 1" />
        <input id="pcapFile" type="file" accept=".pcap,.pcapng" />
        <input id="port" type="number" placeholder="optional port" style="width:140px" />
        <button id="btnUpload">Upload & Parse</button>
      </div>
      <div class="row" style="margin-top:8px">
        <input id="filter" type="text" placeholder="basic filter (ip/port/cmd/avp text)" style="flex:1; min-width:280px" />
        <button id="btnRefresh">Refresh</button>
      </div>
      <div id="summary" class="muted" style="margin-top:8px"></div>
      <div id="error" class="err" style="margin-top:6px"></div>
    </div>

    <div class="grid">
      <div class="card">
        <h4>Packets</h4>
        <div id="packetList" class="list"></div>
      </div>
      <div class="card">
        <h4>Packet detail</h4>
        <div id="packetDetail"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./backend.js"></script>
</body>
</html>
