<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Diameter PCAP WASM Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js"></script>
  <style>
    body{margin:0;background:#0b1220;color:#e7ecff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .wrap{max-width:1400px;margin:0 auto;padding:18px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input,textarea{background:#0f1730;color:#e7ecff;border:1px solid #223055;border-radius:10px;padding:10px}
    textarea{width:100%;min-height:90px}
    button{background:#13224a;border:1px solid #2f4aa6;color:#e7ecff;border-radius:10px;padding:10px 12px;cursor:pointer}
    .grid{display:grid;grid-template-columns:420px 1fr;gap:12px}
    @media(max-width:1100px){.grid{grid-template-columns:1fr}}
    .card{border:1px solid #223055;border-radius:14px;background:#0f1730}
    .hd{padding:12px 14px;border-bottom:1px solid #223055;font-weight:650}
    .bd{padding:12px 14px}
    .list{max-height:520px;overflow:auto;border:1px solid #223055;border-radius:12px}
    .item{padding:10px;border-bottom:1px solid #223055;cursor:pointer}
    .item.active{background:#152a66}
    .tree{max-height:520px;overflow:auto;border:1px solid #223055;border-radius:12px;padding:10px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;white-space:pre}
    table{width:100%;border-collapse:collapse;border:1px solid #223055}
    th,td{border-bottom:1px solid #223055;padding:9px 10px;font-size:12px;vertical-align:top}
    th{position:sticky;top:0;background:#0b1328;text-align:left}
    .muted{color:#9aa7c7}
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Diameter PCAP（WASM 解析）</h2>
    <div class="muted">默认过滤 diameter.cmd.code==272，支持树形与 Excel 导出。</div>
    <div class="grid" style="margin-top:12px;">
      <div class="card">
        <div class="hd">输入与过滤</div>
        <div class="bd">
          <div class="row">
            <input id="pcapFile" type="file" accept=".pcap,.pcapng,application/octet-stream"/>
            <input id="tcpPort" type="number" value="3868" style="width:120px"/>
          </div>
          <div class="row" style="margin-top:10px">
            <input id="filterExpr" type="text" value="diameter.cmd.code==272" style="flex:1;min-width:280px"/>
            <button id="btnApply">应用过滤</button>
            <button id="btnExport">导出 Excel</button>
          </div>
          <div class="muted" style="margin-top:10px">要提取的 AVP（每行一个）</div>
          <textarea id="avpList"></textarea>
          <div class="muted" id="kpi">总消息：0，过滤后：0</div>
        </div>
      </div>
      <div class="card">
        <div class="hd">树形 + 提取结果</div>
        <div class="bd">
          <div class="row" style="align-items:flex-start">
            <div style="width:360px;min-width:280px">
              <div class="muted">Diameter 消息列表</div>
              <div class="list" id="msgList"></div>
            </div>
            <div style="flex:1;min-width:320px">
              <div class="muted">树形（含子树）</div>
              <div class="tree" id="treeView"></div>
            </div>
          </div>
          <div style="margin-top:12px;max-height:360px;overflow:auto">
            <table>
              <thead><tr><th>Index</th><th>Path</th><th>AVP Name</th><th>AVP Content</th><th>AVP Flags</th></tr></thead>
              <tbody id="tblBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
